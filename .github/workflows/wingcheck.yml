# Save as .github/workflows/wingcheck.yml
#
# Four jobs:
#  - forecast: runs the model, sends Telegram alert, logs predictions, then
#    immediately runs refresh_dashboard.py and commits BOTH
#    logs/predictions.jsonl and docs/dashboard_data.json - so the published
#    dashboard shows today's/tomorrow's forecast right after each 07:00 and
#    10:00 run, instead of sitting stale until the evening learn job (a
#    live-forecast-visibility bug fixed on 2026-07-16: predictions were
#    logged all day but the dashboard only refreshed once, at 20:00 CEST).
#  - sample_kitesailing: every 15 min, sunrise-to-sundown (05:00-21:45 CEST,
#    generous enough to cover the full May-Oct range), scrapes the
#    kitesailing.ch Silvaplana lake station reading - this is the model's
#    PRIMARY ground truth for the scored 12:00-18:00 window (see
#    kitesailing_weather.py), and a full-day record for future analysis
#    beyond it
#  - learn: runs later each day, checks that day's predictions against real
#    observations (kitesailing primary, Samedan fallback + secondary signal),
#    updates weights.json, and refreshes the dashboard again (verified
#    outcomes + live_metrics only change here, not in the forecast job)
#  - backtest: MANUAL ONLY (workflow_dispatch). Retrains from 2024-2026
#    history (Samedan-labeled - kitesailing has no historical archive) and
#    regenerates the dashboard. Run this once to start, and again any time
#    you want a from-scratch retrain. This remains the ONLY job that ever
#    writes weights.json - see "promote_features" below.
#  - sync_historical_data: daily (lightweight) AND manual. Runs
#    `historical_data.py sync` (idempotent - see its own docstring) and
#    commits the small manifests only (logs/historical/station_hourly/ and
#    datasets/ are git-ignored - see their READMEs). Never touches
#    weights.json or the operational dashboard.
#  - station_research: MANUAL ONLY. Runs station_analysis.py,
#    calibration_analysis.py, regime_analysis.py, and
#    continuous_target_analysis.py together (a deliberate simplification of
#    the task's suggested separate run_station_analysis/
#    run_calibration_analysis/run_full_research options - one combined
#    research job is easier to keep correct and understandable, per this
#    project's lightweight philosophy), then refresh_research_dashboard.py.
#    Commits the generated reports and docs/research/research_data.json.
#    NEVER touches weights.json - see model_regularized.py's and every
#    research script's own "never modifies weights.json" contract, checked
#    by tests/test_*_analysis.py.
#  - promote_features: MANUAL ONLY, and DELIBERATELY A NO-OP beyond
#    printing the promotion checklist (feature_candidates.PROMOTION_PROCESS).
#    Promoting a candidate feature into production is a source-code change
#    (features.FEATURE_NAMES + model.SCHEMA_VERSION) that a human must make
#    and commit directly, followed by running the EXISTING `run_backtest`
#    option above - this job exists only so "promote_features" appears as
#    a discoverable, self-documenting workflow_dispatch option, and to make
#    explicit that no automated job path can ever silently retrain
#    production on an unvetted candidate.
#
# The forecast/learn/backtest/sync_historical_data/station_research jobs
# all run the offline `tests/` unittest suite (stdlib + Node for the JS
# logic tests, no network calls, a few seconds) right after installing
# dependencies and BEFORE running the real script or committing anything -
# a schema/metric/calibration regression should fail the job instead of
# silently committing bad weights, dashboard data, or research reports.
#
#  - validate: runs on every pull_request. Syntax-checks every module and
#    runs the same offline test suite - nothing else. Deliberately does NOT
#    run forecasts, learning, scraping, backtests, research jobs, Telegram
#    calls, or any commit/push step, since a PR from an untrusted branch
#    must never be able to trigger those (no secrets are exposed to this
#    job either). Each operational job's `if:` explicitly requires
#    github.event_name to be 'schedule' or 'workflow_dispatch' so a
#    pull_request event can never satisfy them, even if the trigger list
#    above grows in the future.
#
# A workflow-level `concurrency` group (below) ensures at most one run per
# branch proceeds at a time, so two jobs that each commit+push (e.g. a
# manual station_research run overlapping with a scheduled forecast run)
# can never race and produce conflicting commits - the second run queues
# instead of running concurrently.
#
# Required repo secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# Required repo setting: Settings -> Actions -> General -> Workflow permissions
#   -> "Read and write permissions" (so jobs can commit log/weight updates)
#
# To view the dashboard: Settings -> Pages -> Source: "Deploy from branch",
# Branch: main, Folder: /docs. Your dashboard will be at
# https://<username>.github.io/<repo>/

name: wingfoil-check

on:
  schedule:
    - cron: "0 5,8 * * *"      # forecast: 07:00 / 10:00 CEST
    - cron: "*/15 3-19 * * *"  # sample_kitesailing: 05:00-21:45 CEST, sunrise to sundown
    - cron: "0 18 * * *"       # learn: 20:00 CEST, checks that day's window
    - cron: "30 1 * * *"       # sync_historical_data: 03:30 CEST, off-peak lightweight station sync
  workflow_dispatch:
    inputs:
      run_backtest:
        description: "Run the full historical backtest/retrain instead of a normal forecast"
        type: boolean
        default: false
      sync_historical_data:
        description: "Sync the historical station archive (historical_data.py sync)"
        type: boolean
        default: false
      run_station_research:
        description: "Run station/calibration/regime/continuous-target research and refresh docs/research.html (never touches weights.json)"
        type: boolean
        default: false
      promote_features:
        description: "Print the feature-promotion checklist (does NOT retrain or touch weights.json - see feature_candidates.py)"
        type: boolean
        default: false
  pull_request:

concurrency:
  group: wingcheck-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Lightweight PR validation: syntax + offline tests only. No network
  # calls beyond `pip install`, no Telegram, no commits, no secrets used.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m py_compile *.py tests/*.py
      - run: python -m unittest discover -s tests

  backtest:
    if: github.event_name == 'workflow_dispatch' && inputs.run_backtest == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python backtest.py
      - name: Commit dataset, weights, dashboard data, and raw data cache
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/backtest_dataset.jsonl weights.json docs/dashboard_data.json logs/raw_cache/
          git diff --staged --quiet || git commit -m "backtest retrain $(date -u +%F)"
          git pull --rebase origin main
          git push

  forecast:
    # Manual dispatch only runs a forecast when NONE of the other special
    # flags are set - otherwise ticking e.g. sync_historical_data alone
    # would also silently trigger a real forecast/Telegram send as a side
    # effect, which is never what that dispatch was asking for.
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 5,8 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_backtest != true &&
       inputs.sync_historical_data != true && inputs.run_station_research != true &&
       inputs.promote_features != true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python forecast_and_log.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - run: python refresh_dashboard.py
      - name: Commit prediction log and refreshed dashboard data
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/predictions.jsonl docs/dashboard_data.json
          git diff --staged --quiet || git commit -m "log predictions and refresh dashboard $(date -u +%F)"
          git pull --rebase origin main
          git push

  sample_kitesailing:
    if: github.event_name == 'schedule' && github.event.schedule == '*/15 3-19 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install playwright==1.61.0
      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.61.0-${{ runner.os }}
      - run: playwright install --with-deps chromium
      - run: python kitesailing_weather.py
      - name: Commit kitesailing observation
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/kitesailing_observations.jsonl
          git diff --staged --quiet || git commit -m "kitesailing observation $(date -u +%FT%H:%M)"
          git pull --rebase origin main
          git push

  learn:
    if: github.event_name == 'schedule' && github.event.schedule == '0 18 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python verify_and_learn.py
      - run: python refresh_dashboard.py
      - name: Commit weight + log + dashboard updates
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/predictions.jsonl weights.json docs/dashboard_data.json
          git diff --staged --quiet || git commit -m "learn from outcomes $(date -u +%F)"
          git pull --rebase origin main
          git push

  sync_historical_data:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 1 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.sync_historical_data == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python historical_data.py sync
      - run: python historical_data.py validate || true  # diagnostic - flags issues, never blocks the commit
      - name: Commit historical archive manifests
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/historical/manifests/
          git diff --staged --quiet || git commit -m "sync historical station archive $(date -u +%F)"
          git pull --rebase origin main
          git push

  station_research:
    if: github.event_name == 'workflow_dispatch' && inputs.run_station_research == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python historical_data.py sync
      - run: python station_analysis.py
      - run: python calibration_analysis.py
      - run: python regime_analysis.py
      - run: python continuous_target_analysis.py
      - run: python refresh_research_dashboard.py
      - name: Commit research reports and research dashboard data
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/historical/reports/ logs/historical/manifests/ docs/research/research_data.json
          git diff --staged --quiet || git commit -m "station research run $(date -u +%F)"
          git pull --rebase origin main
          git push

  promote_features:
    if: github.event_name == 'workflow_dispatch' && inputs.promote_features == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Print the feature-promotion checklist (no retrain, no commit)
        run: |
          python3 -c "
          from feature_candidates import PROMOTION_PROCESS, promotable_candidates
          print('Feature promotion is a manual, source-controlled process - this job')
          print('never retrains or touches weights.json. Steps:')
          for step in PROMOTION_PROCESS:
              print(' ', step)
          print()
          promotable = promotable_candidates()
          if promotable:
              print('Candidates currently at validated_stable and awaiting approval:')
              for name in promotable:
                  print(' -', name)
          else:
              print('No candidates are currently validated_stable and awaiting approval.')
          print()
          print('To actually promote a feature: edit features.py (add to FEATURE_NAMES),')
          print('bump model.SCHEMA_VERSION, commit, then run this workflow with')
          print('run_backtest=true to retrain the deployment model.')
          "
