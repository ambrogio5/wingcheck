# Save as .github/workflows/wingcheck.yml
#
# NOTE: the kitesailing.ch lake sampler lives in its OWN workflow file,
# .github/workflows/kitesailing-sampler.yml, with its own `kitesailing-sampler`
# concurrency group - deliberately separate from this file's
# `wingcheck-operational-${{ github.ref }}` group, so a slow/queued research
# or backtest run in THIS workflow can never delay or block a lake-station
# sample (and vice versa). See that file's own header for details.
#
# Five jobs in this file:
#  - forecast: runs the model, sends Telegram alert, logs predictions, then
#    immediately runs refresh_dashboard.py and commits BOTH
#    logs/predictions.jsonl and docs/dashboard_data.json - so the published
#    dashboard shows today's/tomorrow's forecast right after each 07:00 and
#    10:00 run, instead of sitting stale until the evening learn job (a
#    live-forecast-visibility bug fixed on 2026-07-16: predictions were
#    logged all day but the dashboard only refreshed once, at 20:00 CEST).
#    Runs `station_nowcast.py` first (NOT `historical_data.py sync` - a
#    lightweight, bounded recent-tail fetch for sam/lug/sma/cov, never a
#    full historical discovery/backfill on every forecast run - see
#    station_nowcast.py's own docstring), and commits the append-only
#    forecast-vintage archive and issuance log that forecast_and_log.py
#    itself writes internally (archiving the genuine forecast payload and
#    the station inputs used - see forecast_vintages.py/station_features.py -
#    is done from INSIDE forecast_and_log.py, not as separate workflow
#    steps, so it can never be silently skipped by a workflow edit).
#  - learn: runs later each day, checks that day's predictions against real
#    observations (kitesailing primary, Samedan fallback + secondary signal),
#    updates weights.json, and refreshes the dashboard again (verified
#    outcomes + live_metrics only change here, not in the forecast job)
#  - backtest: MANUAL ONLY (workflow_dispatch). Retrains from 2024-2026
#    history (Samedan-labeled - kitesailing has no historical archive) and
#    regenerates the dashboard. Run this once to start, and again any time
#    you want a from-scratch retrain. The only job that ever writes
#    weights.json.
#  - sync_historical_data: daily (lightweight) AND manual. Runs
#    `historical_data.py sync` + `validate` and commits only the small
#    manifests (logs/historical/station_hourly/ is git-ignored - see its
#    README). Never touches weights.json or the operational dashboard.
#  - station_research: MANUAL ONLY (`run_station_analysis` input). Runs
#    station_analysis.py's ten fixed, pre-registered family comparisons
#    plus its correlation/calibration diagnostics, then
#    refresh_research_dashboard.py. Commits the generated report +
#    docs/research/research_data.json. NEVER touches weights.json -
#    station_analysis.py asserts this itself (see its own `main()`) and
#    tests/test_station_analysis.py checks it offline too. There is no
#    workflow option to promote a candidate feature or station into
#    production - that stays a manual source-code change followed by the
#    existing `run_backtest` option, per this task's explicit "do not
#    promote" constraint.
#
# The forecast/learn/backtest/sync_historical_data/station_research jobs
# all run the offline `tests/` unittest suite (stdlib only, no network
# calls) right after installing dependencies and BEFORE running the real
# script or committing anything - a schema/metric/calibration regression
# should fail the job instead of silently committing bad output.
#
#  - validate: runs on every pull_request. Syntax-checks every module and
#    runs the same offline test suite - nothing else. Deliberately does NOT
#    run forecasts, learning, scraping, backtests, research, Telegram
#    calls, or any commit/push step, since a PR from an untrusted branch
#    must never be able to trigger those (no secrets are exposed to this
#    job either). Each operational job's `if:` explicitly requires
#    github.event_name to be 'schedule' or 'workflow_dispatch' so a
#    pull_request event can never satisfy them, even if the trigger list
#    above grows in the future.
#
# A workflow-level `concurrency` group (below) ensures at most one run per
# branch proceeds at a time, so two jobs that each commit+push (e.g. a
# manual station_research run overlapping a scheduled forecast run) can
# never race and produce conflicting commits.
#
# Required repo secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# Required repo setting: Settings -> Actions -> General -> Workflow permissions
#   -> "Read and write permissions" (so jobs can commit log/weight updates)
#
# To view the dashboard: Settings -> Pages -> Source: "Deploy from branch",
# Branch: main, Folder: /docs. Your dashboard will be at
# https://<username>.github.io/<repo>/

name: wingfoil-check

on:
  schedule:
    - cron: "0 5,8 * * *"      # forecast: 07:00 / 10:00 CEST
    - cron: "0 18 * * *"       # learn: 20:00 CEST, checks that day's window
    - cron: "30 1 * * *"       # sync_historical_data: 03:30 CEST, off-peak lightweight station sync
  workflow_dispatch:
    inputs:
      run_backtest:
        description: "Run the full historical backtest/retrain instead of a normal forecast"
        type: boolean
        default: false
      sync_historical_data:
        description: "Sync the historical station archive (historical_data.py sync)"
        type: boolean
        default: false
      probe_station:
        description: "Optional: also explicitly probe one not-yet-enabled candidate station (e.g. 'cov') for real data - requires sync_historical_data above to also be ticked. Read-only bootstrap check per docs/STATION_RESEARCH.md; never flips enabled/verification itself."
        type: string
        default: ""
      metadata_search:
        description: "Optional: search official MeteoSwiss station names/abbreviations for a substring (e.g. 'bernina') - requires sync_historical_data above to also be ticked. Read-only discovery, never guesses/invents a station code."
        type: string
        default: ""
      metadata_station:
        description: "Optional: look up one exact official station abbreviation's metadata (e.g. 'cov') - requires sync_historical_data above to also be ticked."
        type: string
        default: ""
      run_station_analysis:
        description: "Run station_analysis.py's fixed family comparisons and refresh docs/research.html (never touches weights.json, never promotes a feature)"
        type: boolean
        default: false
  pull_request:

concurrency:
  group: wingcheck-operational-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Lightweight PR validation: syntax + offline tests only. No network
  # calls beyond `pip install`, no Telegram, no commits, no secrets used.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m py_compile *.py tests/*.py
      - run: python -m unittest discover -s tests

  backtest:
    if: github.event_name == 'workflow_dispatch' && inputs.run_backtest == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python backtest.py
      - name: Commit dataset, weights, dashboard data, and raw data cache
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/backtest_dataset.jsonl weights.json docs/dashboard_data.json logs/raw_cache/
          git diff --staged --quiet || git commit -m "backtest retrain $(date -u +%F)"
          git pull --rebase origin main
          git push

  forecast:
    # Manual dispatch only runs a forecast when NONE of the other special
    # flags are set - otherwise ticking e.g. sync_historical_data alone
    # would also silently trigger a real forecast/Telegram send as a side
    # effect, which is never what that dispatch was asking for.
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 5,8 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_backtest != true &&
       inputs.sync_historical_data != true && inputs.run_station_analysis != true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python station_nowcast.py
      - run: python forecast_and_log.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - run: python refresh_dashboard.py
      - name: Commit prediction log, forecast vintages, issuance log, and refreshed dashboard data
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/predictions.jsonl logs/forecast_issuances.jsonl docs/dashboard_data.json \
                  logs/historical/forecast_vintages/
          git diff --staged --quiet || git commit -m "log predictions and refresh dashboard $(date -u +%F)"
          git pull --rebase origin main
          git push

  learn:
    if: github.event_name == 'schedule' && github.event.schedule == '0 18 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python verify_and_learn.py
      - run: python refresh_dashboard.py
      - name: Commit weight + log + dashboard updates
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/predictions.jsonl weights.json docs/dashboard_data.json
          git diff --staged --quiet || git commit -m "learn from outcomes $(date -u +%F)"
          git pull --rebase origin main
          git push

  sync_historical_data:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 1 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.sync_historical_data == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python historical_data.py sync
      - name: Probe one not-yet-enabled candidate station (optional, read-only bootstrap check)
        if: inputs.probe_station != ''
        run: python historical_data.py sync --station "${{ inputs.probe_station }}"
      - name: Search official MeteoSwiss station metadata by name (optional, read-only)
        if: inputs.metadata_search != ''
        run: python historical_data.py metadata --search "${{ inputs.metadata_search }}"
      - name: Look up one exact official station's metadata (optional, read-only)
        if: inputs.metadata_station != ''
        run: python historical_data.py metadata --station "${{ inputs.metadata_station }}"
      - run: python historical_data.py validate || true  # diagnostic - flags issues, never blocks the commit
      - name: Commit historical archive manifests
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/historical/manifests/
          git diff --staged --quiet || git commit -m "sync historical station archive $(date -u +%F)"
          git pull --rebase origin main
          git push

  station_research:
    if: github.event_name == 'workflow_dispatch' && inputs.run_station_analysis == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python -m unittest discover -s tests
      - run: python historical_data.py sync
      - run: python station_analysis.py
      - run: python refresh_research_dashboard.py
      - name: Commit research report and research dashboard data
        run: |
          git config user.name "wingcheck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/historical/reports/ logs/historical/manifests/ docs/research/research_data.json
          git diff --staged --quiet || git commit -m "station research run $(date -u +%F)"
          git pull --rebase origin main
          git push
