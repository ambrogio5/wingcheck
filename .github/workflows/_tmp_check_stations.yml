# TEMPORARY, one-off diagnostic workflow - manual trigger only.
# Confirms the real MeteoSwiss station codes for Lugano and Zurich before
# wiring real pressure observations into features.py. Delete this file and
# _tmp_check_stations.py once confirmed.

name: tmp-check-stations

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python _tmp_check_stations.py
