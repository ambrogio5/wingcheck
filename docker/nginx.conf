server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker may assign the API a new address after an image rebuild. Resolve
    # the service name on every request instead of caching its startup address.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api:8080;

    location = /dashboard_data.json {
        proxy_pass http://$api_upstream/api/dashboard;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        add_header Cache-Control "no-store";
    }
    location /api/ {
        proxy_pass http://$api_upstream$request_uri;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        add_header Cache-Control "no-store";
    }
    location / { try_files $uri $uri/ /index.html; }
}
